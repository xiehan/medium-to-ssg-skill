name: Skill bug or inaccuracy
description: Report something wrong, broken, or out of date in a skill or its docs.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve these skills! Please describe the problem as specifically as you can.
  - type: dropdown
    id: skill
    attributes:
      label: Which skill?
      options:
        - medium-to-ssg
        - medium-publication-export
        - Repo tooling / CI
        - Not sure
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What's wrong?
      description: What did the skill or its docs say or do, and why is it incorrect?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should happen instead?
    validations:
      required: true
  - type: dropdown
    id: ssg
    attributes:
      label: Static site generator (if the bug involves the generated site)
      description: >-
        Which SSG did you choose? Many build/styling problems are specific to
        one generator. Leave as "Not applicable" if your issue isn't about
        building the site.
      options:
        - Not applicable
        - Hugo
        - Eleventy (11ty)
    validations:
      required: false
  - type: input
    id: theme
    attributes:
      label: Theme or starter (if the bug involves the generated site)
      description: >-
        Many build/styling problems are theme- or starter-specific. If your
        issue relates to scaffolding or building the site, name the Hugo theme
        or Eleventy starter and link its repo (e.g. "Anatole —
        https://github.com/lxndrblz/anatole" or "eleventy-base-blog —
        https://github.com/11ty/eleventy-base-blog"). Leave blank if not
        relevant.
      placeholder: Theme or starter name — repo URL
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: >-
        Hosting path (AWS / GitHub Pages), infra method (Terraform / AWS CLI),
        personal vs. publication export, OS, and the generator version — Hugo
        version (incl. whether it's the extended build) or Node.js + Eleventy
        version — anything relevant.
    validations:
      required: false
